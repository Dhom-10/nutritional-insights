name: CI/CD Pipeline

# Run this workflow on every push to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the analysis script
      - name: Test data analysis script
        run: python data_analysis.py

      # Step 5: Build the Docker image
      - name: Build Docker image
        run: docker build -t diet-analysis .

      # Step 6: Confirm the image was built
      - name: Verify Docker image
        run: docker images | grep diet-analysis